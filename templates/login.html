{% extends "default.html" %}

{% block content %}

<style>
    body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    }

    /* Blurred Background Layer */
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: url('https://images.unsplash.com/photo-1508780709619-79562169bc64?q=80&w=1920&auto=format&fit=crop')
                    no-repeat center center;
        background-size: cover;
        filter: blur(1.5px); /* Adjust blur here */
        transform: scale(1.05); /* Prevent white edges after blur */
        z-index: -1;
    }

    .login-card {
        border-radius: 20px;
        backdrop-filter: blur(15px);
        background: rgba(2, 4, 87, 0.312);
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: 0.4s ease;
    }

    .login-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .form-control {
        border-radius: 10px;
    }

    .btn-custom {
        border-radius: 30px;
        transition: 0.3s;
    }

    .btn-custom:hover {
        transform: scale(1.05);
    }

    .password-toggle {
    cursor: pointer;
    transition: 0.3s;
    }

    .password-toggle:hover {
        background-color: #b69f94;
    }

    
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="col-11 col-sm-9 col-md-6 col-lg-5">
        <div class="card login-card shadow-lg p-4 text-white">

            <div class="text-center mb-4">
                <h3 class="fw-bold">Welcome Back 👋</h3>
                <p>Login to continue to <strong>Apply Saathi</strong></p>
            </div>

            <!-- Flash Messages
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %} -->

            <form method="POST" action="{{ url_for('main.login') }}">
                
                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <!-- Password -->
                
                <!-- Password -->
                <div class="mb-2">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" name="password" id="password" class="form-control" required>
                
                        <span class="input-group-text bg-white password-toggle" onclick="togglePassword()">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </span>
                    </div>
                </div>
                
                <!-- Forgot Password -->
                <div class="text-end mb-3">
                    <a href="{{ url_for('main.forgot_password') }}"
                        class="text-warning text-decoration-none small fw-semibold forgot-link">
                        Forgot Password?
                    </a>
                </div>

                <!-- Submit -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-light btn-custom fw-bold">
                        Login
                    </button>
                </div>

                <div class="text-center mt-3">
                    <small>
                        Don't have an account?
                        <a href="{{ url_for('main.register') }}" class="text-warning fw-bold">
                            Register
                        </a>
                    </small>
                </div>

            </form>
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordField = document.getElementById("password");
        const toggleIcon = document.getElementById("toggleIcon");

        if (passwordField.type === "password") {
            passwordField.type = "text";
            toggleIcon.classList.remove("bi-eye");
            toggleIcon.classList.add("bi-eye-slash");
        } else {
            passwordField.type = "password";
            toggleIcon.classList.remove("bi-eye-slash");
            toggleIcon.classList.add("bi-eye");
        }
    }
</script>

{% endblock %}
