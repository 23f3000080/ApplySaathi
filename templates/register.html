{% extends "default.html" %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
    <!-- Main Outer Card -->
    <div class="register-main-card overflow-hidden w-100">
        <div class="row g-0">
            <!-- Left Side: Image -->
            <div class="col-lg-6 d-none d-lg-block">
                <div class="register-image-side">
                    <div class="image-overlay">
                        <div class="overlay-content p-5">
                            <h2 class="display-5 fw-bold text-white">Join Apply Saathi</h2>
                            <p class="lead text-white-50">Save time on every application. Let us handle the complexity while you chase your dreams.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side: Form -->
            <div class="col-lg-6 col-md-12 p-4 p-sm-5 bg-card-custom">
                <div class="register-header mb-4">
                    <h2 class="fw-bold">Create <span class="text-dark">Account</span></h2>
                    <p class="text-muted-custom">Join Apply Saathi for effortless applications</p>
                </div>

                <form method="POST" action="{{ url_for('main.register') }}" class="register-form">
                    <!-- Full Name -->
                    <div class="mb-3">
                        <label class="form-label small text-uppercase fw-bold text-muted">Full Name</label>
                        <div class="input-group-custom">
                            <i class="fas fa-user icon"></i>
                            <input type="text" name="name" class="form-control-custom" placeholder="John Doe" required>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label small text-uppercase fw-bold text-muted">Email Address</label>
                        <div class="input-group-custom">
                            <i class="fas fa-envelope icon"></i>
                            <input type="email" name="email" class="form-control-custom" placeholder="john@example.com" required>
                        </div>
                    </div>

                    <!-- Phone -->
                    <div class="mb-3">
                        <label class="form-label small text-uppercase fw-bold text-muted">Phone Number</label>
                        <div class="input-group-custom">
                            <i class="fas fa-phone icon"></i>
                            <input type="text" name="phone" class="form-control-custom" placeholder="+91 00000 00000" required>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="mb-4">
                        <label class="form-label small text-uppercase fw-bold text-muted">Password</label>
                        <div class="input-group-custom">
                            <i class="fas fa-lock icon"></i>
                            <input type="password" name="password" class="form-control-custom" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-register-submit w-100">
                        Create Account <i class="fas fa-arrow-right ms-2"></i>
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted-custom small">
                        Already have an account? 
                        <a href="{{ url_for('main.login') }}" class="text-accent text-decoration-none fw-bold ms-1">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
