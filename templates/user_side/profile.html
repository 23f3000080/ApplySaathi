{% extends "default.html" %}
{% block content %}

<div class="container py-5">

    <div class="row">
        <div class="col-lg-8 mx-auto">

            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">

                    <h3 class="fw-bold mb-4">My Profile</h3>

                    <form method="POST" action="{{ url_for('main.update_profile') }}">

                        <!-- Basic Info -->
                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text"
                                       name="name"
                                       class="form-control"
                                       value="{{ current_user.name }}"
                                       required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email"
                                       name="email"
                                       class="form-control"
                                       value="{{ current_user.email }}"
                                       required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone</label>
                                <input type="text"
                                       name="phone"
                                       class="form-control"
                                       value="{{ current_user.phone }}"
                                       required>
                            </div>

                        </div>

                        <hr class="my-4">

                        <h5 class="fw-semibold mb-3">Change Password (Optional)</h5>

                        <div class="row">

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Current Password</label>
                                <div class="input-group">
                                    <input type="password" name="current_password" id="current_password" class="form-control"
                                        placeholder="Required to change password">
                                    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('current_password', this)">
                                        👁
                                    </button>
                                </div>
                            </div>
                            
                            <div class="col-md-4 mb-3">
                                <label class="form-label">New Password</label>
                                <div class="input-group">
                                    <input type="password" name="new_password" id="new_password" class="form-control">
                                    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('new_password', this)">
                                        👁
                                    </button>
                                </div>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Confirm Password</label>
                                <div class="input-group">
                                    <input type="password" name="confirm_password" id="confirm_password" class="form-control">
                                    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('confirm_password', this)">
                                        👁
                                    </button>
                                </div>
                            </div>
                            </div>

                        <div class="text-end mt-3">
                            <button type="submit"
                                    class="btn btn-primary px-4 rounded-pill">
                                Update Profile
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

<script>
function togglePassword(fieldId, button) {

    let input = document.getElementById(fieldId);

    if (input.type === "password") {
        input.type = "text";
        button.textContent = "🙈";
    } else {
        input.type = "password";
        button.textContent = "👁";
    }
}
</script>

{% endblock %}
